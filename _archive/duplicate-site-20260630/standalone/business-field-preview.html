.bf-grid{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:.4;background-image:linear-gradient(rgba(255,255,255,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.1) 1px,transparent 1px);background-size:54px 54px;mask-image:radial-gradient(80% 90% at 18% 0%,#000,transparent 75%);}
